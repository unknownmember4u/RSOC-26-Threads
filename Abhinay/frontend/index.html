<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Kill any stale service workers that interfere with Vite HMR -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log('[SW] Unregistered:', registration.scope);
          }
        });
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
            console.log('[Cache] Cleared:', name);
          }
        });
      }
    </script>
    <meta name="description" content="NagarMitra — AI-Powered Smart City Analytics Platform for Municipal Governance" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>NagarMitra 🏙️ | Smart City Analytics</title>
  </head>
